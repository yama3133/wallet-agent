AWSTemplateFormatVersion: "2010-09-09"
Description: >
  wallet-agent DynamoDB tables: tasks / approvals / txns.
  PAY_PER_REQUEST、tasks には DynamoDB Streams を NEW_AND_OLD_IMAGES で有効化（フロントの SSE 購読用）。

Parameters:
  TablePrefix:
    Type: String
    Default: wallet_agent
    Description: テーブル名のプレフィックス。

Resources:
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}_tasks"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: task_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_user
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  ApprovalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}_approvals"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: approval_id
          AttributeType: S
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: approval_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_task
          KeySchema:
            - AttributeName: task_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  TxnsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}_txns"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: txn_id
          AttributeType: S
        - AttributeName: task_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: txn_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by_task
          KeySchema:
            - AttributeName: task_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  TasksTableName:
    Value: !Ref TasksTable
  TasksStreamArn:
    Value: !GetAtt TasksTable.StreamArn
  ApprovalsTableName:
    Value: !Ref ApprovalsTable
  ApprovalsStreamArn:
    Value: !GetAtt ApprovalsTable.StreamArn
  TxnsTableName:
    Value: !Ref TxnsTable
